name: iOS Premium Build Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  build_ios:
    name: Build Flutter iOS App
    runs-on: macos-latest

    steps:
      # 1. Checkout the code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Install Flutter SDK
      # We use the latest stable channel instead of a pinned old version
      # to ensure native ARM64 support on macOS runners and full Xcode 15/16 compatibility.
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:"

      # 4. Update CocoaPods specs to ensure all dependencies are in sync
      - name: Set up CocoaPods
        run: |
          pod repo update

      # 5. Install Project Dependencies
      - name: Install Project Dependencies
        run: flutter pub get

      # 6. Build Unsigned iOS App
      # Compiling using "ios" is more reliable and robust on CI runners than "ipa"
      # since it skips the heavy archiving step which often expects code-signing certificates.
      - name: Build Unsigned iOS App Bundle
        run: |
          flutter build ios --no-codesign CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" PROVISIONING_PROFILE_REQUIRED=NO

      # 7. Package the compiled .app into an installable/unsigned .ipa
      # Placing the Runner.app inside a "Payload" directory and compressing it
      # is the standard and elegant way to generate an unsigned .ipa for distribution/sideloading.
      - name: Package Unsigned IPA
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r clearapp-ios-unsigned.ipa Payload

      # 8. Upload the unsigned IPA as a release artifact
      - name: Archive Production Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clearapp-ios-unsigned-ipa
          path: build/ios/iphoneos/clearapp-ios-unsigned.ipa
          if-no-files-found: error
          retention-days: 7
