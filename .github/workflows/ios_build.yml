name: iOS Premium Build Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  build_ios:
    name: Build Flutter iOS App
    runs-on: macos-latest

    steps:
      # 1. Checkout the code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Java (required by some tools or plugins, though less critical for pure iOS, it is good practice for completeness)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Install Flutter
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.1' # Matching the exact project version from pubspec.yaml
          channel: 'stable'
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:"

      # 4. Install Dependencies
      - name: Install Project Dependencies
        run: flutter pub get

      # 5. Build iOS App (Without code signing for CI/CD checks)
      # Building an unsigned IPA is standard in public/automated CI/CD to verify Xcode compilation
      # without exposing premium App Store Developer profiles and private key credentials.
      - name: Build Unsigned iOS IPA
        run: |
          flutter build ipa --no-codesign

      # 6. Compress and package the build outputs
      # This saves the build directory as a structured artifact
      - name: Archive Production Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clearapp-ios-unsigned-ipa
          path: build/ios/archive/Runner.xcarchive
          if-no-files-found: error
          retention-days: 7
