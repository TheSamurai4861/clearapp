name: Build premium unsigned iOS IPA

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-premium-unsigned-ios-ipa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  metadata:
    name: Resolve version metadata
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
      build_name: ${{ steps.version.outputs.build_name }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - id: version
        name: Read version from pubspec.yaml
        shell: bash
        run: |
          set -euo pipefail

          raw_version="$(awk '/^version: / { print $2; exit }' pubspec.yaml)"
          if [ -z "$raw_version" ]; then
            echo "Unable to read version from pubspec.yaml" >&2
            exit 1
          fi

          build_name="${raw_version%%+*}"
          build_number="${raw_version##*+}"
          if [ "$build_number" = "$raw_version" ]; then
            build_number="1"
          fi

          echo "app_version=$raw_version" >> "$GITHUB_OUTPUT"
          echo "build_name=$build_name" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"

  ios:
    name: Build premium unsigned IPA
    runs-on: macos-latest
    needs: metadata
    env:
      APP_VERSION: ${{ needs.metadata.outputs.app_version }}
      BUILD_NAME: ${{ needs.metadata.outputs.build_name }}
      BUILD_NUMBER: ${{ needs.metadata.outputs.build_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Diagnose iOS build inputs
        shell: bash
        run: |
          set -euo pipefail

          flutter doctor -v
          test -f ios/Podfile
          test -d ios/Runner.xcodeproj/xcshareddata/xcschemes
          ls -la ios
          ls -la ios/Runner.xcodeproj/xcshareddata/xcschemes

      - name: Verify Dart analysis
        shell: bash
        run: |
          set -euo pipefail

          flutter analyze

      - name: Build premium unsigned iOS app
        shell: bash
        run: |
          set -euo pipefail

          flutter build ios \
            --release \
            --no-codesign \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUMBER"

      - name: Package premium unsigned IPA
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          test -d build/ios/iphoneos/Runner.app
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/Runner.app
          (
            cd build/ios/ipa
            zip -r "../../../dist/clearapp-premium-${APP_VERSION}.ipa" Payload
          )
          test -s "dist/clearapp-premium-${APP_VERSION}.ipa"

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: clearapp-premium-ios-${{ env.APP_VERSION }}
          path: dist/clearapp-premium-${{ env.APP_VERSION }}.ipa
          retention-days: 30
